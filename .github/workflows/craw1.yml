name: Web Crawler Monitor

on:
  schedule:
    # 毎日 午前9時（JST）に実行 ※UTC表記なので0時=JST9時
    - cron: '0 0 * * *'
  workflow_dispatch:
    # GitHubの画面から手動実行もできる

permissions:
  contents: write  # スナップショット・レポートをコミットするために必要
  pages: write
  id-token: write

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      # 1. リポジトリをチェックアウト
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # 2. Pythonをセットアップ
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      # 3. ライブラリをインストール
      - name: Install dependencies
        run: pip install requests beautifulsoup4 jinja2

      # 4. クローラー実行
      - name: Run crawler
        env:
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          PAGES_URL:          https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: python crawler.py

      # 5. レポートをGitHub Pages用に配置（一覧ページ＋個別レポート）
      - name: Prepare Pages report
        run: |
          mkdir -p docs

          # 各レポートをdocsにコピー
          for f in reports/report_*.html; do
            [ -e "$f" ] || continue
            cp "$f" "docs/$(basename $f)"
          done

          # Pythonでサマリーを読み取りindex.htmlを生成
          python3 - <<'PYEOF'
          import json, os, glob

          summaries = []
          for path in sorted(glob.glob("reports/summary_*.json"), reverse=True):
              with open(path, encoding="utf-8") as f:
                  summaries.append(json.load(f))

          def badge(s):
              c = s["counts"]
              has = s["has_change"]
              if not has:
                  return '<span class="badge ok">✅ 変更なし</span>'
              parts = []
              if c["changed"]: parts.append(f'<span class="badge changed">📝 変更 {c["changed"]}件</span>')
              if c["new"]:     parts.append(f'<span class="badge new">🆕 新規 {c["new"]}件</span>')
              if c["error_404"]: parts.append(f'<span class="badge error404">🚫 404 {c["error_404"]}件</span>')
              if c["error"]:   parts.append(f'<span class="badge error">❌ エラー {c["error"]}件</span>')
              return " ".join(parts)

          def fmt_time(ts):
              return f"{ts[0:4]}年{ts[4:6]}月{ts[6:8]}日 {ts[9:11]}:{ts[11:13]}"

          rows = ""
          for s in summaries:
              ts   = s["timestamp"]
              fname = s["filename"]
              rows += f"""
              <tr>
                <td>{fmt_time(ts)}</td>
                <td>{badge(s)}</td>
                <td><a href="{fname}">レポートを開く →</a></td>
              </tr>"""

          if not rows:
              rows = '<tr><td colspan="3" style="color:#64748b">レポートがまだありません</td></tr>'

          html = f"""<!DOCTYPE html>
          <html lang="ja">
          <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1">
          <title>WebCrawler レポート一覧</title>
          <style>
            body {{ font-family:"Segoe UI",sans-serif; background:#f8fafc; color:#1e293b; padding:24px; }}
            h1 {{ font-size:1.4rem; margin-bottom:4px; }}
            .meta {{ color:#64748b; font-size:0.875rem; margin-bottom:24px; }}
            table {{ border-collapse:collapse; width:100%; max-width:900px; background:#fff; border-radius:12px; overflow:hidden; box-shadow:0 1px 4px rgba(0,0,0,0.08); }}
            th {{ background:#f1f5f9; padding:12px 16px; text-align:left; font-size:0.8rem; color:#64748b; text-transform:uppercase; }}
            td {{ padding:12px 16px; border-top:1px solid #e2e8f0; font-size:0.9rem; vertical-align:middle; }}
            tr:hover td {{ background:#f8fafc; }}
            a {{ color:#2563eb; text-decoration:none; font-weight:600; }}
            a:hover {{ text-decoration:underline; }}
            .badge {{ display:inline-block; padding:3px 10px; border-radius:9999px; font-size:0.78rem; font-weight:600; margin-right:4px; }}
            .badge.ok      {{ background:#dcfce7; color:#166534; }}
            .badge.changed {{ background:#fef9c3; color:#854d0e; }}
            .badge.new     {{ background:#dbeafe; color:#1e40af; }}
            .badge.error404{{ background:#ffedd5; color:#9a3412; }}
            .badge.error   {{ background:#fee2e2; color:#991b1b; }}
          </style>
          </head>
          <body>
          <h1>🔍 WebCrawler レポート一覧</h1>
          <p class="meta">最新の実行が上に表示されます（1週間分保持）</p>
          <table>
          <thead><tr><th>実行日時</th><th>サマリー</th><th>詳細</th></tr></thead>
          <tbody>{rows}</tbody>
          </table>
          </body>
          </html>"""

          with open("docs/index.html", "w", encoding="utf-8") as f:
              f.write(html)
          print("index.html 生成完了")
          PYEOF

      # 6. 1週間以上経過したレポートを削除
      - name: Cleanup old reports
        run: |
          find reports/ -name "report_*.html"   -mtime +7 -delete
          find reports/ -name "summary_*.json"  -mtime +7 -delete
          find docs/    -name "report_*.html"   -mtime +7 -delete
          echo "7日以上前のレポート・サマリーを削除しました"

      # 7. スナップショット・レポートをリポジトリにコミット
      - name: Commit snapshots and reports

        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add snapshots/ docs/ reports/ config.json
          # 変更がある場合だけコミット
          git diff --cached --quiet || git commit -m "🔍 crawl: $(date +'%Y-%m-%d %H:%M') JST"
          # リモートの変更を取り込んでからプッシュ（競合対策）
          git pull --rebase origin main
          git push