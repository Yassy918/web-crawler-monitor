name: Web Crawler Monitor

on:
  schedule:
    # 毎日 午前9時（JST）に実行 ※UTC表記なので0時=JST9時
    - cron: '0 0 * * *'
  workflow_dispatch:
    # GitHubの画面から手動実行もできる

permissions:
  contents: write  # スナップショット・レポートをコミットするために必要
  pages: write
  id-token: write

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      # 1. リポジトリをチェックアウト
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # 2. Pythonをセットアップ
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      # 3. ライブラリをインストール
      - name: Install dependencies
        run: pip install requests beautifulsoup4 jinja2

      # 4. クローラー実行
      - name: Run crawler
        env:
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          PAGES_URL:          https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: python crawler.py

      # 5. レポートをGitHub Pages用に配置（一覧ページ＋個別レポート）
      - name: Prepare Pages report
        run: |
          mkdir -p docs

          # 各レポートをdocsにコピー
          for f in reports/report_*.html; do
            [ -e "$f" ] || continue
            cp "$f" "docs/$(basename $f)"
          done

          # 一覧ページ（index.html）を生成
          cat <<'EOF_HEAD' > docs/index.html
          <!DOCTYPE html>
          <html lang="ja">
          <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1">
          <title>WebCrawler レポート一覧</title>
          <style>
            body { font-family: "Segoe UI", sans-serif; background: #f8fafc; color: #1e293b; padding: 24px; }
            h1 { font-size: 1.4rem; margin-bottom: 4px; }
            .meta { color: #64748b; font-size: 0.875rem; margin-bottom: 24px; }
            table { border-collapse: collapse; width: 100%; max-width: 800px; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
            th { background: #f1f5f9; padding: 12px 16px; text-align: left; font-size: 0.8rem; color: #64748b; text-transform: uppercase; }
            td { padding: 12px 16px; border-top: 1px solid #e2e8f0; font-size: 0.9rem; }
            tr:hover td { background: #f8fafc; }
            a { color: #2563eb; text-decoration: none; }
            a:hover { text-decoration: underline; }
            .badge-new { background:#dbeafe; color:#1e40af; padding:2px 8px; border-radius:4px; font-size:0.75rem; }
          </style>
          </head>
          <body>
          <h1>🔍 WebCrawler レポート一覧</h1>
          <p class="meta">最新のレポートが上に表示されます</p>
          <table>
          <thead><tr><th>実行日時</th><th>レポート</th></tr></thead>
          <tbody>
          EOF_HEAD

          # レポートを新しい順に列挙
          for f in $(ls -t docs/report_*.html 2>/dev/null); do
            fname=$(basename "$f")
            # ファイル名から日時を抽出して整形 report_YYYYMMDD_HHMMSS.html
            raw=$(echo "$fname" | sed 's/report_//;s/\.html//')
            date_part=$(echo "$raw" | cut -d_ -f1)
            time_part=$(echo "$raw" | cut -d_ -f2)
            year=${date_part:0:4}
            month=${date_part:4:2}
            day=${date_part:6:2}
            hour=${time_part:0:2}
            min=${time_part:2:2}
            label="${year}年${month}月${day}日 ${hour}:${min}"
            echo "    <tr><td>${label}</td><td><a href=\"${fname}\">レポートを開く</a></td></tr>" >> docs/index.html
          done

          cat <<'EOF_FOOT' >> docs/index.html
          </tbody>
          </table>
          </body>
          </html>
          EOF_FOOT

      # 6. 1週間以上経過したレポートを削除
      - name: Cleanup old reports
        run: |
          find reports/ -name "report_*.html" -mtime +7 -delete
          find docs/    -name "report_*.html" -mtime +7 -delete
          echo "7日以上前のレポートを削除しました"

      # 7. スナップショット・レポートをリポジトリにコミット
      - name: Commit snapshots and reports

        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add snapshots/ docs/ reports/ config.json
          # 変更がある場合だけコミット
          git diff --cached --quiet || git commit -m "🔍 crawl: $(date +'%Y-%m-%d %H:%M') JST"
          # リモートの変更を取り込んでからプッシュ（競合対策）
          git pull --rebase origin main
          git push